global:
  scrape_interval: 15s

scrape_configs:
  - job_name: "pharmacy-db"
    static_configs:
      - targets: ["pharmacy-postgres-exporter:9187"]
        labels:
          service: "pharmacy"
          database: "pharmacy_db"

  - job_name: "medication-db"
    static_configs:
      - targets: ["medication-postgres-exporter:9187"]
        labels:
          service: "medication"
          database: "medication_db"

  - job_name: "notification-db"
    static_configs:
      - targets: ["notification-postgres-exporter:9187"]
        labels:
          service: "notification"
          database: "sophia_db"
