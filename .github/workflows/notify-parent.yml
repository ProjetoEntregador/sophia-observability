name: Notificar repo pai (sophia)

on:
  push:
    branches: [develop]

jobs:
  notify-parent:
    runs-on: ubuntu-latest
    steps:
      - name: Disparar bump no sophia
        env:
          DISPATCH_TOKEN: ${{ secrets.SOPHIA_DISPATCH_TOKEN }}
        run: |
          curl -sSf -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $DISPATCH_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/ProjetoEntregador/sophia/dispatches \
            -d '{
              "event_type": "submodule-update",
              "client_payload": {
                "repo": "${{ github.event.repository.name }}",
                "sha": "${{ github.sha }}",
                "ref": "${{ github.ref_name }}"
              }
            }'
